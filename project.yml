name: FastMarkdownPreview
options:
  bundleIdPrefix: com.anshu
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_VERSION: "5.9"
    CODE_SIGN_IDENTITY: "Apple Development"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""

targets:
  FastMarkdownPreview:
    type: application
    platform: macOS
    sources:
      - path: Sources/FastMarkdownPreview
        type: group
      - path: Resources
        buildPhase: resources
        excludes:
          - .gitkeep
    info:
      path: Sources/FastMarkdownPreview/Info.plist
      properties:
        CFBundleName: Fast Markdown Preview
        CFBundleDisplayName: Fast Markdown Preview
        CFBundleIdentifier: com.anshu.FastMarkdownPreview
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        NSPrincipalClass: NSApplication
        LSUIElement: true
        NSHighResolutionCapable: true
        NSAppleEventsUsageDescription: "Used to read the selected file in Finder."
        CFBundleDocumentTypes:
          - CFBundleTypeName: Markdown File
            CFBundleTypeRole: Viewer
            LSHandlerRank: Default
            LSItemContentTypes:
              - net.daringfireball.markdown
              - public.markdown
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: net.daringfireball.markdown
            UTTypeConformsTo:
              - public.plain-text
            UTTypeDescription: Markdown Document
            UTTypeTagSpecification:
              public.filename-extension:
                - md
                - markdown
    settings:
      base:
        PRODUCT_NAME: FastMarkdownPreview
        SWIFT_OBJC_BRIDGING_HEADER: Sources/FastMarkdownPreview/FastMarkdownPreview-Bridging-Header.h
        HEADER_SEARCH_PATHS: $(PROJECT_DIR)/Libs/cmark-gfm/include
        LIBRARY_SEARCH_PATHS: $(PROJECT_DIR)/Libs/cmark-gfm/lib
        OTHER_LDFLAGS: "-lcmark-gfm -lcmark-gfm-extensions"
    dependencies:
      - framework: Carbon.framework
        embed: false
      - target: QLExtension

  QLExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: Sources/QLExtension
        type: group
      - path: Sources/FastMarkdownPreview/MarkdownRenderer.swift
      - path: Sources/FastMarkdownPreview/HTMLTemplate.swift
      - path: Resources
        buildPhase: resources
        excludes:
          - .gitkeep
    info:
      path: Sources/QLExtension/Info.plist
      properties:
        CFBundleName: QLExtension
        CFBundleDisplayName: Fast Markdown Preview QuickLook
        CFBundleIdentifier: com.anshu.FastMarkdownPreview.QLExtension
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.quicklook.preview
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).PreviewViewController
          NSExtensionAttributes:
            QLSupportedContentTypes:
              - net.daringfireball.markdown
              - public.markdown
            QLSupportsSearchableItems: false
    settings:
      base:
        PRODUCT_NAME: QLExtension
        SKIP_INSTALL: "YES"
        CODE_SIGN_ENTITLEMENTS: Sources/QLExtension/QLExtension.entitlements
        SWIFT_OBJC_BRIDGING_HEADER: Sources/QLExtension/QLExtension-Bridging-Header.h
        HEADER_SEARCH_PATHS: $(PROJECT_DIR)/Libs/cmark-gfm/include
        LIBRARY_SEARCH_PATHS: $(PROJECT_DIR)/Libs/cmark-gfm/lib
        OTHER_LDFLAGS: "-lcmark-gfm -lcmark-gfm-extensions"

  FastMarkdownPreviewTests:
    type: bundle.unit-test
    platform: macOS
    # Include test sources AND the app sources under test directly
    sources:
      - path: Tests/FastMarkdownPreviewTests
        type: group
      - path: Sources/FastMarkdownPreview/MarkdownRenderer.swift
      - path: Sources/FastMarkdownPreview/FileWatcher.swift
    settings:
      base:
        SWIFT_OBJC_BRIDGING_HEADER: Sources/FastMarkdownPreview/FastMarkdownPreview-Bridging-Header.h
        HEADER_SEARCH_PATHS: $(PROJECT_DIR)/Libs/cmark-gfm/include
        LIBRARY_SEARCH_PATHS: $(PROJECT_DIR)/Libs/cmark-gfm/lib
        OTHER_LDFLAGS: "-lcmark-gfm -lcmark-gfm-extensions"
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: ""

schemes:
  FastMarkdownPreview:
    build:
      targets:
        FastMarkdownPreview: all
        QLExtension: all
    test:
      targets:
        - FastMarkdownPreviewTests
